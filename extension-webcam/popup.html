<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meet Raw Data PoC</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <h1>🎙 Meet Raw Data PoC</h1>
      <div class="actions">
        <button id="viewer" type="button">Viewer</button>
        <!-- ❌ DISABLED: background.js chưa có handler export-session -->
        <!-- <button id="export" type="button">Export</button> -->
        <button id="clear" type="button">Clear</button>
      </div>
    </header>

    <!-- Cảnh báo offline -->
    <div id="offline-warning" class="warning-bar" style="display:none;">
      ⚠️ <strong>Mất mạng!</strong> Đừng tắt tab — dữ liệu đang lưu tạm trên máy.
    </div>

    <!-- Trạng thái server + queue -->
    <div class="status-row">
      <!-- ❌ DISABLED: server.js chưa có /api/ping -->
      <!-- <span id="serverStatus">🔄 Đang kiểm tra server...</span> -->
      <span id="queueBadge" class="badge" style="display:none;"></span>
    </div>

    <!-- Identity -->
    <section id="identity-section">
      <label for="studentIdInput">Tên lớp:</label>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <input type="text" id="studentIdInput" placeholder="VD: Lop-12A1">
        <button id="saveIdentity" type="button" class="btn-primary">Lưu</button>
      </div>
      <div id="identityStatus" class="hint">Đang dùng ID ngẫu nhiên. Vui lòng cập nhật.</div>
    </section>

    <section id="status">Waiting for Google Meet media...</section>
    <main id="events"></main>

    <script src="env.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
