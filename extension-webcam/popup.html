<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meet Raw Data PoC</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #18181b;
        color: #e4e4e7;
        font-size: 13px;
      }
      header {
        background: #27272a;
        padding: 12px 14px;
        border-bottom: 1px solid #3f3f46;
      }
      header h1 { font-size: 14px; font-weight: 600; color: #f4f4f5; }
      header p  { font-size: 11px; color: #71717a; margin-top: 2px; }

      .warning {
        background: #422006;
        border: 1px solid #92400e;
        border-radius: 6px;
        margin: 12px;
        padding: 10px 12px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .warning .icon { font-size: 16px; flex-shrink: 0; }
      .warning .text { line-height: 1.5; color: #fed7aa; font-size: 12px; }
      .warning strong { color: #fb923c; display: block; margin-bottom: 2px; }

      .status-box {
        margin: 0 12px 12px;
        background: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 6px;
        padding: 10px 12px;
      }
      .status-box .label { font-size: 11px; color: #71717a; margin-bottom: 4px; }
      .status-box .value { font-size: 12px; color: #a1a1aa; }
      .status-box .value.active { color: #4ade80; }

      .queue-box {
        margin: 0 12px 12px;
        background: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .queue-box .label { font-size: 11px; color: #71717a; }
      .queue-box .count {
        font-size: 18px;
        font-weight: 700;
        color: #f4f4f5;
      }
      .queue-box .count.has-items { color: #fb923c; }
    </style>
  </head>
  <body>
    <header>
      <h1>🎙 Meet Raw Data PoC</h1>
      <p>Đang ghi âm thanh và hình ảnh</p>
    </header>

    <div class="warning">
      <span class="icon">⚠️</span>
      <div class="text">
        <strong>Đừng tắt tab Google Meet!</strong>
        Tắt tab sẽ dừng ghi âm. Dữ liệu chưa gửi lên server sẽ bị mất.
      </div>
    </div>

    <div class="status-box">
      <div class="label">Trạng thái server</div>
      <div class="value" id="serverStatus">Đang kiểm tra...</div>
    </div>

    <div class="queue-box">
      <div>
        <div class="label">Chunk đang chờ gửi</div>
        <div class="label" style="color:#52525b;font-size:10px;">(trong IndexedDB)</div>
      </div>
      <div class="count" id="queueCount">...</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
